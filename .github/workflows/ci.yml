name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: face_attendance
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d face_attendance"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: face-attendance/backend
    env:
      APP_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/face_attendance
      SECRET_KEY: ci-only-secret-key-with-at-least-thirty-two-characters
      AI_SERVICE_URL: http://127.0.0.1:8001
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            face-attendance/backend/requirements.txt
            face-attendance/backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: python -m alembic upgrade head
      - run: python -m alembic check
      - run: python -m pytest -q
      - run: python -m pip check
      - run: pip install pip-audit && pip-audit -r requirements.txt

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: face-attendance/frontend
    env:
      NEXT_PUBLIC_API_URL: /api/backend
      NEXT_PUBLIC_ALLOW_SIGNUP: "false"
      BACKEND_INTERNAL_URL: https://backend.example.invalid
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: face-attendance/frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  ai-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: face-attendance/ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: face-attendance/ai-service/requirements-test.txt
      - run: pip install -r requirements-test.txt
      - run: python -m pytest -q
      - run: python -m compileall -q main.py utils.py
      - run: python -m pip check
      - run: pip install pip-audit && pip-audit -r requirements.txt
